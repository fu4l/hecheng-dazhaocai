<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>合成大招财</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #f6f1e1;
    font-family: "STKaiti", serif;
    text-align: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 0 10px 60px 10px;
  }

  #scoreBar {
    position: sticky;
    top: 0;
    width: 100%;
    background: #f6f1e1;
    border-bottom: 3px solid #c8b68a;
    padding: 12px 0;
    font-size: 18px;
    color: #5a3b1e;
    z-index: 10;
    flex-shrink: 0;
    margin: 0 -10px;
    padding-left: 10px;
    padding-right: 10px;
  }

  h2 {
    color: #5a3b1e;
    font-size: 24px;
    margin: 10px 0;
    flex-shrink: 0;
  }

  #ui {
    background: #efe6c9;
    border: 3px solid #c8b68a;
    border-radius: 15px;
    padding: 15px;
    margin: 10px 0;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #ui > div {
    font-size: 16px;
    color: #5a3b1e;
    font-weight: bold;
  }

  #next {
    width: 80px;
    height: 80px;
    border: 2px solid #c8b68a;
    border-radius: 8px;
    background: #ffffff;
  }

  #gameContainer {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #game {
    display: block;
    border: 3px solid #c8b68a;
    background: #ffffff;
    flex: 1;
    width: 100%;
    max-width: 100%;
    cursor: crosshair;
  }

  #gameOver {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff8dc;
    border: 3px solid #c8b68a;
    padding: 25px;
    border-radius: 10px;
    display: none;
    z-index: 20;
    font-size: 1.2rem;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  #finalScore {
    margin-bottom: 10px;
    color: #5a3b1e;
  }

  #gameOver button {
    padding: 12px 25px;
    font-size: 1rem;
    background: #c8b68a;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    font-weight: bold;
  }

  #gameOver button:active {
    background: #a89468;
  }

  @media (max-width: 600px) {
    body {
      padding: 0 8px 80px 8px;
    }

    #scoreBar {
      font-size: 16px;
      padding: 10px 0;
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
    }

    h2 {
      font-size: 20px;
      margin: 8px 0;
    }

    #ui {
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      gap: 8px;
    }

    #ui > div {
      font-size: 14px;
    }

    #next {
      width: 70px;
      height: 70px;
    }

    #gameOver {
      padding: 20px;
      font-size: 1rem;
    }

    #gameOver button {
      padding: 10px 20px;
      font-size: 0.9rem;
    }
  }

  @supports (padding: max(0px)) {
    body {
      padding-bottom: max(60px, env(safe-area-inset-bottom));
    }

    @media (max-width: 600px) {
      body {
        padding-bottom: max(80px, env(safe-area-inset-bottom));
      }
    }
  }
</style>

</head>
<body>

<div id="scoreBar">分数：0</div>

<h2>合成大招财</h2>

<div id="ui">
  <div>下一个：</div>
  <canvas id="next" width="80" height="80"></canvas>
</div>

<div id="gameContainer">
  <canvas id="game"></canvas>
</div>

<div id="gameOver">
  <div id="finalScore"></div>
  <button onclick="location.reload()">重新开始</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
const { Engine, Render, World, Bodies, Events, Body } = Matter;

const engine = Engine.create();
const world = engine.world;
world.gravity.y = 1;

const canvas = document.getElementById("game");

// 获取游戏区域尺寸
function getGameDimensions() {
  const scoreBar = document.getElementById("scoreBar");
  const h2 = document.querySelector("h2");
  const ui = document.getElementById("ui");
  
  const usedHeight = scoreBar.offsetHeight + h2.offsetHeight + ui.offsetHeight + 40;
  const availableHeight = window.innerHeight - usedHeight;
  const availableWidth = window.innerWidth - 20;
  
  return {
    width: availableWidth,
    height: Math.max(availableHeight, 300)
  };
}

let dims = getGameDimensions();
let gameWidth = dims.width;
let gameHeight = dims.height;

canvas.width = gameWidth;
canvas.height = gameHeight;

const render = Render.create({
  canvas: canvas,
  engine: engine,
  options: {
    width: gameWidth,
    height: gameHeight,
    wireframes: false,
    background: "#ffffff"
  }
});

const DEAD_LINE = 80;
const SAFE_TIME = 500;

const items = ["1.png","2.png","3.png","4.png","5.png","6.png","7.png","8.png","9.png","10.png"];

const textures = items.map(src => {
  let img = new Image();
  img.src = "images/" + src;
  return img;
});

const sizeMap = [20,24,28,32,36,42,48,56,64,72];

let bodies = [];
let currentBody = null;
let nextLevel = Math.floor(Math.random() * 3);
let score = 0;
let gameOver = false;

World.add(world, [
  Bodies.rectangle(gameWidth / 2, gameHeight + 10, gameWidth, 20, { isStatic: true }),
  Bodies.rectangle(-10, gameHeight / 2, 20, gameHeight, { isStatic: true }),
  Bodies.rectangle(gameWidth + 10, gameHeight / 2, 20, gameHeight, { isStatic: true })
]);

function updateScore(add) {
  score += add;
  document.getElementById("scoreBar").innerText = "分数：" + score;
}

function createBall(x, level) {
  let body = Bodies.circle(x, 50, sizeMap[level], {
    isStatic: true,
    restitution: 0.2,
    friction: 0.8,
    frictionAir: 0.02,
    density: 0.001
  });
  body.level = level;
  body.spawnTime = Date.now();
  body.stillCount = 0;
  return body;
}

function spawnNew() {
  if (gameOver) return;

  currentBody = createBall(gameWidth / 2, nextLevel);
  bodies.push(currentBody);
  World.add(world, currentBody);

  nextLevel = Math.floor(Math.random() * 3);
  drawNext();
}

function drawNext() {
  let canvas = document.getElementById("next");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, 80, 80);

  ctx.save();
  ctx.beginPath();
  ctx.arc(40, 40, 35, 0, Math.PI * 2);
  ctx.clip();
  ctx.drawImage(textures[nextLevel], 5, 5, 70, 70);
  ctx.restore();
}

// 点击或触摸时立即下落
function handleGameAction(e) {
  if (!currentBody || gameOver) return;

  let rect = canvas.getBoundingClientRect();
  let x;
  
  if (e.touches) {
    e.preventDefault();
    x = e.touches[0].clientX - rect.left;
  } else {
    x = e.clientX - rect.left;
  }
  
  // 限制在游戏区域内
  x = Math.max(sizeMap[currentBody.level], Math.min(gameWidth - sizeMap[currentBody.level], x));

  // 修改位置
  Body.setPosition(currentBody, { x: x, y: 50 });
  
  // 改为非静态，让物理引擎接管
  Body.setStatic(currentBody, false);
  
  currentBody.spawnTime = Date.now();
  currentBody = null;

  setTimeout(spawnNew, 400);
}

// 同时支持鼠标点击和触摸
canvas.addEventListener("click", handleGameAction);
canvas.addEventListener("touchstart", handleGameAction, { passive: false });

// 碰撞检测 - 合成逻辑
Events.on(engine, "collisionStart", function(event) {
  event.pairs.forEach(pair => {
    let a = pair.bodyA;
    let b = pair.bodyB;

    if (a.level !== undefined && b.level !== undefined) {
      if (a.level === b.level && a.level < items.length - 1) {

        let newLevel = a.level + 1;

        World.remove(world, a);
        World.remove(world, b);
        bodies = bodies.filter(obj => obj !== a && obj !== b);

        let newBody = Bodies.circle(
          (a.position.x + b.position.x) / 2,
          (a.position.y + b.position.y) / 2,
          sizeMap[newLevel],
          { 
            restitution: 0.2,
            friction: 0.8,
            frictionAir: 0.02,
            density: 0.001
          }
        );

        newBody.level = newLevel;
        newBody.spawnTime = Date.now();
        newBody.stillCount = 0;
        bodies.push(newBody);
        World.add(world, newBody);

        updateScore((newLevel + 1) * 10);
      }
    }
  });
});

// 物理更新 - 检查游戏结束和物体停止
Events.on(engine, "afterUpdate", () => {
  if (gameOver) return;

  const now = Date.now();
  const VELOCITY_THRESHOLD = 0.5;
  const STILL_FRAMES = 5;

  bodies.forEach(body => {
    // 检查游戏结束条件
    if (
      !body.isStatic &&
      (now - body.spawnTime > SAFE_TIME) &&
      body.position.y < DEAD_LINE
    ) {
      gameOver = true;

      document.getElementById("finalScore").innerText =
        "最终分数：" + score;

      document.getElementById("gameOver").style.display = "block";
    }

    // 检测物体是否停止
    const speed = Math.sqrt(body.velocity.x ** 2 + body.velocity.y ** 2);
    
    if (!body.isStatic && speed < VELOCITY_THRESHOLD) {
      body.stillCount = (body.stillCount || 0) + 1;
      
      // 物体停止几帧后，设置为静态状态
      if (body.stillCount > STILL_FRAMES) {
        Body.setVelocity(body, { x: 0, y: 0 });
        Body.setAngularVelocity(body, 0);
      }
    } else {
      body.stillCount = 0;
    }
  });
});

// 渲染
Events.on(render, "afterRender", function() {
  const ctx = render.context;

  ctx.beginPath();
  ctx.moveTo(0, DEAD_LINE);
  ctx.lineTo(gameWidth, DEAD_LINE);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  ctx.stroke();

  bodies.forEach(body => {
    if (!body.position || body.level === undefined) return;

    let r = body.circleRadius;

    ctx.save();
    ctx.beginPath();
    ctx.arc(body.position.x, body.position.y, r, 0, Math.PI * 2);
    ctx.clip();

    ctx.drawImage(
      textures[body.level],
      body.position.x - r,
      body.position.y - r,
      r * 2,
      r * 2
    );

    ctx.restore();
  });
});

spawnNew();

Engine.run(engine);
Render.run(render);
</script>

</body>
</html>
