<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>合成大招财</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #f6f1e1;
    font-family: "STKaiti", serif;
    text-align: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 0;
  }

  /* 模式选择页面 */
  #modeSelectionPage {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #f6f1e1 0%, #efe6c9 100%);
    padding: 24px 20px;
    gap: 20px;
    overflow-y: auto;
  }

  #modeSelectionPage.hidden {
    display: none;
  }

  .selection-logo {
    width: min(240px, 56vw);
    max-height: 150px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .mode-title {
    font-size: 32px;
    color: #5a3b1e;
    margin-bottom: 12px;
    font-weight: bold;
  }

  .mode-buttons {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 20px;
  }

  .mode-button {
    width: 140px;
    height: 140px;
    border: 3px solid #c8b68a;
    border-radius: 15px;
    background: #fff8dc;
    font-size: 18px;
    color: #5a3b1e;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  .mode-button:hover {
    background: #efe6c9;
    transform: scale(1.05);
  }

  .mode-button:active {
    transform: scale(0.98);
  }

  .mode-icon {
    font-size: 48px;
  }

  .mode-name {
    font-weight: bold;
    font-size: 16px;
  }

  /* 游戏页面 */
  #gamePage {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 0 10px 60px 10px;
  }

  #gamePage.hidden {
    display: none;
  }

  #scoreBar {
    position: sticky;
    top: 0;
    width: 100%;
    background: #f6f1e1;
    border-bottom: 3px solid #c8b68a;
    padding: 12px 0;
    font-size: 18px;
    color: #5a3b1e;
    z-index: 10;
    flex-shrink: 0;
    margin: 0 -10px;
    padding-left: 10px;
    padding-right: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    overflow: hidden;
  }

  .game-top-logo {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: min(88px, 22vw);
    max-height: calc(100% - 8px);
    object-fit: contain;
    pointer-events: none;
  }

  .mode-indicator {
    font-size: 14px;
    color: #c8b68a;
  }

  h2 {
    color: #5a3b1e;
    font-size: 24px;
    margin: 10px 0;
    flex-shrink: 0;
  }

  #gamePage.bounce-layout h2 {
    margin: 8px 0 6px;
  }

  #ui {
    background: #efe6c9;
    border: 3px solid #c8b68a;
    border-radius: 15px;
    padding: 15px;
    margin: 10px 0;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #gamePage.bounce-layout #ui {
    position: absolute;
    top: 22px;
    left: 34px;
    z-index: 5;
    margin: 0;
    padding: 0;
    border: none;
    border-radius: 0;
    background: transparent;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    pointer-events: none;
  }

  #ui > div {
    font-size: 16px;
    color: #5a3b1e;
    font-weight: bold;
  }

  #gamePage.bounce-layout #ui > div {
    font-size: 16px;
    line-height: 1;
  }

  #next {
    width: 80px;
    height: 80px;
    border: 2px solid #c8b68a;
    border-radius: 8px;
    background: #ffffff;
  }

  #gamePage.bounce-layout #next {
    width: var(--bounce-next-size, 48px);
    height: var(--bounce-next-size, 48px);
    background: rgba(255, 255, 255, 0.96);
  }

  #gameContainer {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
  }

  #game {
    display: block;
    border: 3px solid #c8b68a;
    background: #ffffff;
    flex: 1;
    width: 100%;
    max-width: 100%;
    cursor: crosshair;
  }

  #gameOver {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff8dc;
    border: 3px solid #c8b68a;
    padding: 25px;
    border-radius: 10px;
    display: none;
    z-index: 20;
    font-size: 1.2rem;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  #finalScore {
    margin-bottom: 10px;
    color: #5a3b1e;
  }

  #gameOver button {
    padding: 12px 25px;
    font-size: 1rem;
    background: #c8b68a;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    font-weight: bold;
    margin-right: 10px;
  }

  #gameOver button:active {
    background: #a89468;
  }

  .back-button {
    margin-top: 10px;
    padding: 8px 16px;
    font-size: 0.9rem;
    background: #9b9b9b;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  @media (max-width: 600px) {
    #modeSelectionPage {
      padding: 20px 16px;
      gap: 14px;
    }

    .selection-logo {
      width: min(190px, 62vw);
      max-height: 120px;
    }

    #gamePage {
      padding: 0 8px 80px 8px;
    }

    #scoreBar {
      font-size: 16px;
      padding: 10px 0;
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
    }

    .game-top-logo {
      width: min(72px, 24vw);
      max-height: calc(100% - 8px);
    }

    h2 {
      font-size: 20px;
      margin: 8px 0;
    }

    #gamePage.bounce-layout h2 {
      margin: 6px 0 4px;
    }

    #ui {
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      gap: 8px;
    }

    #gamePage.bounce-layout #ui {
      top: 16px;
      left: 22px;
      padding: 0;
      margin: 0;
      gap: 6px;
    }

    #ui > div {
      font-size: 14px;
    }

    #gamePage.bounce-layout #ui > div {
      font-size: 14px;
    }

    #next {
      width: 70px;
      height: 70px;
    }

    #gamePage.bounce-layout #next {
      width: var(--bounce-next-size, 40px);
      height: var(--bounce-next-size, 40px);
    }

    #gameOver {
      padding: 20px;
      font-size: 1rem;
    }

    #gameOver button {
      padding: 10px 20px;
      font-size: 0.9rem;
    }

    .mode-title {
      font-size: 24px;
      margin-bottom: 30px;
    }

    .mode-button {
      width: 120px;
      height: 120px;
      font-size: 16px;
    }

    .mode-icon {
      font-size: 40px;
    }
  }

  @supports (padding: max(0px)) {
    #gamePage {
      padding-bottom: max(60px, env(safe-area-inset-bottom));
    }

    @media (max-width: 600px) {
      #gamePage {
        padding-bottom: max(80px, env(safe-area-inset-bottom));
      }
    }
  }
</style>

</head>
<body>

<!-- 模式选择页面 -->
<div id="modeSelectionPage">
  <img class="selection-logo" src="./images/yys.png" alt="招财猫" onerror="this.style.display='none'">
  <div class="mode-title">选择游戏模式</div>
  <div class="mode-buttons">
    <button class="mode-button" onclick="startGame('normal')">
      <span class="mode-icon">😊</span>
      <span class="mode-name">普通模式</span>
    </button>
    <button class="mode-button" onclick="startGame('bounce')">
      <span class="mode-icon">🎪</span>
      <span class="mode-name">颠勺模式</span>
    </button>
  </div>
</div>

<!-- 游戏页面 -->
<div id="gamePage" class="hidden">
  <div id="scoreBar">
    <span>分数：<span id="scoreValue">0</span></span>
    <img class="game-top-logo" src="./images/yys.png" alt="招财猫" onerror="this.style.display='none'">
    <span class="mode-indicator" id="modeIndicator"></span>
  </div>

  <h2>合成大招财</h2>

  <div id="ui">
    <div>下一个：</div>
    <canvas id="next" width="80" height="80"></canvas>
  </div>

  <div id="gameContainer">
    <canvas id="game"></canvas>
  </div>

  <div id="gameOver">
    <div id="finalScore"></div>
    <button onclick="backToMode()">返回菜单</button>
    <button onclick="location.reload()">重新开始</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
const { Engine, Render, World, Bodies, Events, Body } = Matter;

let currentMode = null;
let engine = null;
let render = null;
let world = null;

function updateGameLayout(mode) {
  const gamePage = document.getElementById("gamePage");
  const gameContainer = document.getElementById("gameContainer");
  const ui = document.getElementById("ui");

  if (mode === "bounce") {
    gamePage.classList.add("bounce-layout");
    if (ui.parentElement !== gameContainer) {
      gameContainer.appendChild(ui);
    }
    return;
  }

  gamePage.classList.remove("bounce-layout");
  if (ui.parentElement !== gamePage) {
    gamePage.insertBefore(ui, gameContainer);
  }
}

function startGame(mode) {
  currentMode = mode;
  
  document.getElementById("modeSelectionPage").classList.add("hidden");
  document.getElementById("gamePage").classList.remove("hidden");
  updateGameLayout(mode);

  const modeText = mode === 'normal' ? '普通模式' : '颠勺模式';
  document.getElementById("modeIndicator").innerText = modeText;
  
  initializeGame();
}

function backToMode() {
  if (engine) {
    Engine.clear(engine);
    Render.stop(render);
  }

  updateGameLayout("normal");

  document.getElementById("modeSelectionPage").classList.remove("hidden");
  document.getElementById("gamePage").classList.add("hidden");
  document.getElementById("gameOver").style.display = "none";
}

function initializeGame() {
  engine = Engine.create();
  world = engine.world;
  world.gravity.y = 1;

  const canvas = document.getElementById("game");
  const nextCanvas = document.getElementById("next");
  const gamePage = document.getElementById("gamePage");

  // 获取游戏区域尺寸
  function getGameDimensions() {
    const scoreBar = document.getElementById("scoreBar");
    const h2 = document.querySelector("h2");
    const ui = document.getElementById("ui");
    const isBounceLayout = gamePage.classList.contains("bounce-layout");
    const gamePageStyle = window.getComputedStyle(gamePage);
    const h2Style = window.getComputedStyle(h2);
    const uiStyle = window.getComputedStyle(ui);
    const pagePaddingTop = parseFloat(gamePageStyle.paddingTop) || 0;
    const pagePaddingBottom = parseFloat(gamePageStyle.paddingBottom) || 0;
    const pagePaddingLeft = parseFloat(gamePageStyle.paddingLeft) || 0;
    const pagePaddingRight = parseFloat(gamePageStyle.paddingRight) || 0;
    const titleMargins = (parseFloat(h2Style.marginTop) || 0) + (parseFloat(h2Style.marginBottom) || 0);
    const uiMargins = (parseFloat(uiStyle.marginTop) || 0) + (parseFloat(uiStyle.marginBottom) || 0);
    const overlayReserve = isBounceLayout ? 0 : ui.offsetHeight + uiMargins;
    const availableHeight = gamePage.clientHeight - pagePaddingTop - pagePaddingBottom - scoreBar.offsetHeight - h2.offsetHeight - titleMargins - overlayReserve;
    const availableWidth = gamePage.clientWidth - pagePaddingLeft - pagePaddingRight;

    return {
      width: availableWidth,
      height: Math.max(availableHeight, 300)
    };
  }

  let dims = getGameDimensions();
  let gameWidth = dims.width;
  let gameHeight = dims.height;

  function configureNextPreview() {
    if (currentMode === "bounce") {
      const previewTop = window.innerWidth <= 600 ? 16 : 22;
      const labelHeight = window.innerWidth <= 600 ? 22 : 26;
      const previewMargin = 12;
      const previewLimit = Math.floor(gameHeight / 5) - previewTop - labelHeight - previewMargin;
      const previewSize = Math.max(34, Math.min(52, previewLimit));

      gamePage.style.setProperty("--bounce-next-size", previewSize + "px");
      nextCanvas.width = previewSize;
      nextCanvas.height = previewSize;
      return;
    }

    gamePage.style.removeProperty("--bounce-next-size");
    nextCanvas.width = 80;
    nextCanvas.height = 80;
  }

  configureNextPreview();

  canvas.width = gameWidth;
  canvas.height = gameHeight;

  render = Render.create({
    canvas: canvas,
    engine: engine,
    options: {
      width: gameWidth,
      height: gameHeight,
      wireframes: false,
      background: "#ffffff"
    }
  });

  const DEAD_LINE = currentMode === 'bounce' ? Math.round(gameHeight / 5) : 80;
  const SAFE_TIME = currentMode === 'normal' ? 500 : 300;
  const LINE_STAY_TIME = currentMode === 'bounce' ? 1000 : 800;

  const items = ["1.png","2.png","3.png","4.png","5.png","6.png","7.png","8.png","9.png","10.png"];

  const textures = items.map(src => {
    let img = new Image();
    img.src = "images/" + src;
    return img;
  });

  const sizeMap = [20,24,28,32,36,42,48,56,64,72];

  let bodies = [];
  let currentBody = null;
  let nextLevel = Math.floor(Math.random() * 3);
  let score = 0;
  let gameOver = false;

  World.add(world, [
    Bodies.rectangle(gameWidth / 2, gameHeight + 10, gameWidth, 20, { isStatic: true }),
    Bodies.rectangle(-10, gameHeight / 2, 20, gameHeight, { isStatic: true }),
    Bodies.rectangle(gameWidth + 10, gameHeight / 2, 20, gameHeight, { isStatic: true })
  ]);

  function updateScore(add) {
    score += add;
    document.getElementById("scoreValue").innerText = score;
  }

  function createBall(x, level) {
    let restitution, friction, frictionAir;
    
    if (currentMode === 'bounce') {
      restitution = 0.4;
      friction = 0.5;
      frictionAir = 0;
    } else {
      restitution = 0.2;
      friction = 0.8;
      frictionAir = 0.02;
    }
    
    let body = Bodies.circle(x, 50, sizeMap[level], {
      isStatic: true,
      restitution: restitution,
      friction: friction,
      frictionAir: frictionAir,
      density: 0.001
    });
    body.level = level;
    body.spawnTime = Date.now();
    body.stillCount = 0;
    body.aboveLineStart = null;
    return body;
  }

  function spawnNew() {
    if (gameOver) return;

    currentBody = createBall(gameWidth / 2, nextLevel);
    bodies.push(currentBody);
    World.add(world, currentBody);

    nextLevel = Math.floor(Math.random() * 3);
    drawNext();
  }

  function drawNext() {
    let canvas = document.getElementById("next");
    let ctx = canvas.getContext("2d");
    const size = canvas.width;
    const padding = Math.max(4, Math.floor(size * 0.08));
    const radius = (size / 2) - padding;

    ctx.clearRect(0, 0, size, size);

    ctx.save();
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, radius, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(textures[nextLevel], padding, padding, size - padding * 2, size - padding * 2);
    ctx.restore();
  }

  // 点击或触摸时立即下落
  function handleGameAction(e) {
    if (!currentBody || gameOver) return;

    let rect = canvas.getBoundingClientRect();
    let x;
    
    if (e.touches) {
      e.preventDefault();
      x = e.touches[0].clientX - rect.left;
    } else {
      x = e.clientX - rect.left;
    }
    
    // 限制在游戏区域内
    x = Math.max(sizeMap[currentBody.level], Math.min(gameWidth - sizeMap[currentBody.level], x));

    // 修改位置
    Body.setPosition(currentBody, { x: x, y: 50 });
    
    // 改为非静态，让物理引擎接管
    Body.setStatic(currentBody, false);
    
    currentBody.spawnTime = Date.now();
    currentBody = null;

    setTimeout(spawnNew, 400);
  }

  // 同时支持鼠标点击和触摸
  canvas.addEventListener("click", handleGameAction);
  canvas.addEventListener("touchstart", handleGameAction, { passive: false });

  // 碰撞检测 - 合成逻辑
  Events.on(engine, "collisionStart", function(event) {
    event.pairs.forEach(pair => {
      let a = pair.bodyA;
      let b = pair.bodyB;

      if (a.level !== undefined && b.level !== undefined) {
        if (a.level === b.level && a.level < items.length - 1) {

          let newLevel = a.level + 1;

          World.remove(world, a);
          World.remove(world, b);
          bodies = bodies.filter(obj => obj !== a && obj !== b);

          let restitution, friction, frictionAir;
          
          if (currentMode === 'bounce') {
            restitution = 0.4;
            friction = 0.5;
            frictionAir = 0;
          } else {
            restitution = 0.2;
            friction = 0.8;
            frictionAir = 0.02;
          }

          let newBody = Bodies.circle(
            (a.position.x + b.position.x) / 2,
            (a.position.y + b.position.y) / 2,
            sizeMap[newLevel],
            { 
              restitution: restitution,
              friction: friction,
              frictionAir: frictionAir,
              density: 0.001
            }
          );

          newBody.level = newLevel;
          newBody.spawnTime = Date.now();
          newBody.stillCount = 0;
          newBody.aboveLineStart = null;
          bodies.push(newBody);
          World.add(world, newBody);

          updateScore((newLevel + 1) * 10);
        }
      }
    });
  });

  // 颠勺模式：持续补充能量使其一直弹跳
  Events.on(engine, "collisionActive", function(event) {
    if (currentMode !== 'bounce') return;

    event.pairs.forEach(pair => {
      let a = pair.bodyA;
      let b = pair.bodyB;

      // 检测球是否在碰撞
      let ballBody = null;
      if (a.level !== undefined && !a.isStatic) {
        ballBody = a;
      } else if (b.level !== undefined && !b.isStatic) {
        ballBody = b;
      }

      if (ballBody) {
        // 保持速度不衰减，维持持续弹跳
        const speed = Math.sqrt(ballBody.velocity.x ** 2 + ballBody.velocity.y ** 2);
        
        // 如果速度太低，给予一个向上的推力
        if (speed < 2) {
          Body.setVelocity(ballBody, {
            x: ballBody.velocity.x,
            y: -3
          });
        }
      }
    });
  });

  // 物理更新 - 检查游戏结束和物体停止
  Events.on(engine, "afterUpdate", () => {
    if (gameOver) return;

    const now = Date.now();
    const VELOCITY_THRESHOLD = 0.5;
    const STILL_FRAMES = 5;
    let shouldEndGame = false;

    bodies.forEach(body => {
      const bodyTop = body.position.y - body.circleRadius;
      const isAboveDeadLine = bodyTop < DEAD_LINE;
      const isReleasedBody = body !== currentBody;

      if (isReleasedBody && (now - body.spawnTime > SAFE_TIME) && isAboveDeadLine) {
        body.aboveLineStart = body.aboveLineStart || now;

        if (now - body.aboveLineStart >= LINE_STAY_TIME) {
          shouldEndGame = true;
        }
      } else {
        body.aboveLineStart = null;
      }
      // 检测物体是否停止（仅普通模式）
      if (currentMode === 'normal') {
        const speed = Math.sqrt(body.velocity.x ** 2 + body.velocity.y ** 2);
        
        if (!body.isStatic && speed < VELOCITY_THRESHOLD) {
          body.stillCount = (body.stillCount || 0) + 1;
          
          // 物体停止几帧后，设置为静态状态
          if (body.stillCount > STILL_FRAMES) {
            Body.setVelocity(body, { x: 0, y: 0 });
            Body.setAngularVelocity(body, 0);
          }
        } else {
          body.stillCount = 0;
        }
      }
    });

    if (shouldEndGame) {
      gameOver = true;
      document.getElementById("finalScore").innerText =
        "最终分数：" + score;
      document.getElementById("gameOver").style.display = "block";
    }
  });

  // 渲染
  Events.on(render, "afterRender", function() {
    const ctx = render.context;

    ctx.beginPath();
    ctx.moveTo(0, DEAD_LINE);
    ctx.lineTo(gameWidth, DEAD_LINE);
    ctx.strokeStyle = "red";
    ctx.lineWidth = 2;
    ctx.stroke();

    bodies.forEach(body => {
      if (!body.position || body.level === undefined) return;

      let r = body.circleRadius;

      ctx.save();
      ctx.beginPath();
      ctx.arc(body.position.x, body.position.y, r, 0, Math.PI * 2);
      ctx.clip();

      ctx.drawImage(
        textures[body.level],
        body.position.x - r,
        body.position.y - r,
        r * 2,
        r * 2
      );

      ctx.restore();
    });
  });

  spawnNew();

  Engine.run(engine);
  Render.run(render);
}
</script>

</body>
</html>
